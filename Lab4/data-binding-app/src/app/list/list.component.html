<h2>Presidents of Ireland</h2>>

<ul>
    <li *ngFor="let president of presidents">
        {{ president }}
    </li> <!--display name of presidents-->
</ul>

<ol>
    @for(pres of presidents;track pres){
        <li>{{ pres}}</li> <!--display name of presidents in li-->
    }
</ol>

<h2>Presidents of Ireland Terms</h2>
<ul>
    @for(president of presidents2;track president){
        <li>{{ president.name}}, {{president.term}}</li> <!--display name and term of presidents in li-->
    }
</ul>
